<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교실 룰렛</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffecd2, #fcb69f, #ffd1dc, #c7e9fb);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px; color: #4a3728;
  }
  @keyframes bgShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  h1 { font-size: 2.2rem; margin-bottom: 20px; color: #c0614a; text-shadow: 0 2px 8px rgba(192,97,74,0.2); letter-spacing: 2px; }
  .main { display: flex; gap: 30px; align-items: flex-start; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1000px; }
  .wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .pointer { width:0; height:0; border-left:18px solid transparent; border-right:18px solid transparent; border-top:36px solid #e07b54; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  canvas { border-radius:50%; box-shadow:0 8px 32px rgba(192,97,74,0.25),0 2px 8px rgba(0,0,0,0.08); }
  .spin-btn { padding:16px 52px; font-size:1.4rem; font-weight:bold; background:linear-gradient(135deg,#f9a97e,#e07b54); color:#fff; border:none; border-radius:50px; cursor:pointer; box-shadow:0 4px 18px rgba(224,123,84,0.4); transition:transform 0.1s; letter-spacing:1px; }
  .spin-btn:hover { transform:scale(1.05); }
  .spin-btn:active { transform:scale(0.97); }
  .spin-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
  .panel { background:rgba(255,255,255,0.55); border:1.5px solid rgba(255,255,255,0.8); border-radius:20px; padding:22px; width:280px; backdrop-filter:blur(12px); box-shadow:0 4px 24px rgba(192,97,74,0.1); }
  .panel h2 { font-size:1.1rem; margin-bottom:12px; color:#c0614a; }
  .input-row { display:flex; gap:8px; margin-bottom:12px; }
  .input-row input { flex:1; padding:10px 12px; border-radius:10px; border:1.5px solid rgba(192,97,74,0.25); background:rgba(255,255,255,0.7); color:#4a3728; font-size:1rem; outline:none; }
  .input-row input::placeholder { color:#c9a898; }
  .input-row input:focus { border-color:#e07b54; }
  .input-row button { padding:10px 15px; border-radius:10px; border:none; background:linear-gradient(135deg,#f9a97e,#e07b54); color:#fff; font-weight:bold; font-size:1.2rem; cursor:pointer; }
  .items-list { list-style:none; display:flex; flex-direction:column; gap:6px; max-height:260px; overflow-y:auto; margin-bottom:12px; }
  .items-list li { display:flex; align-items:center; background:rgba(255,255,255,0.6); border-radius:10px; padding:8px 12px; font-size:0.95rem; color:#4a3728; }
  .items-list li span.dot { width:13px; height:13px; border-radius:50%; display:inline-block; margin-right:8px; flex-shrink:0; }
  .items-list li .name { flex:1; }
  .del-btn { background:none; border:none; color:#e07b5488; cursor:pointer; font-size:1.1rem; padding:0 4px; }
  .del-btn:hover { color:#e07b54; }
  .edit-items-btn { width:100%; padding:9px; border-radius:10px; border:1.5px solid rgba(192,97,74,0.25); background:rgba(255,255,255,0.5); color:#c0614a; font-size:0.9rem; cursor:pointer; margin-top:4px; transition:background 0.15s; }
  .edit-items-btn:hover { background:rgba(255,255,255,0.8); }
  .status-bar { display:flex; align-items:center; gap:6px; margin-top:8px; font-size:0.78rem; min-height:20px; }
  .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .status-dot.ok { background:#7cb87c; }
  .status-dot.loading { background:#f9a97e; animation:pulse 1s infinite; }
  .status-dot.err { background:#e07b54; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-text { color:#a08070; }
  .overlay { display:none; position:fixed; inset:0; background:rgba(255,220,200,0.55); backdrop-filter:blur(6px); z-index:100; justify-content:center; align-items:center; flex-direction:column; gap:20px; }
  .overlay.show { display:flex; }
  .result-box { background:linear-gradient(135deg,#fff8f5,#ffe8de); border:3px solid #e07b54; border-radius:28px; padding:44px 64px; text-align:center; box-shadow:0 8px 48px rgba(224,123,84,0.3); animation:pop 0.4s ease; }
  @keyframes pop { 0%{transform:scale(0.5);opacity:0} 80%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
  .result-box .label { font-size:1.2rem; color:#c9a898; margin-bottom:10px; }
  .result-box .winner { font-size:3.2rem; font-weight:bold; color:#c0614a; }
  .close-btn { padding:13px 44px; font-size:1.1rem; background:linear-gradient(135deg,#f9a97e,#e07b54); color:#fff; border:none; border-radius:50px; cursor:pointer; font-weight:bold; }
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(255,220,200,0.5); backdrop-filter:blur(8px); z-index:200; justify-content:center; align-items:center; }
  .modal-bg.show { display:flex; }
  .modal { background:linear-gradient(135deg,#fff8f5,#fff0e8); border:2px solid #f9a97e; border-radius:22px; padding:32px; width:460px; max-width:95vw; box-shadow:0 8px 40px rgba(224,123,84,0.2); }
  .modal h2 { color:#c0614a; font-size:1.4rem; margin-bottom:6px; }
  .modal p { color:#c9a898; font-size:0.88rem; margin-bottom:16px; }
  .modal textarea { width:100%; height:200px; padding:14px; border-radius:12px; border:1.5px solid rgba(192,97,74,0.25); background:rgba(255,255,255,0.7); color:#4a3728; font-size:1rem; resize:vertical; outline:none; line-height:1.8; }
  .modal textarea:focus { border-color:#e07b54; }
  .modal textarea::placeholder { color:#c9a898; }
  .modal-btns { display:flex; gap:10px; margin-top:16px; justify-content:flex-end; }
  .modal-btns button { padding:11px 28px; border-radius:50px; border:none; font-size:1rem; font-weight:bold; cursor:pointer; }
  .btn-cancel { background:rgba(192,97,74,0.1); color:#c0614a; }
  .btn-save { background:linear-gradient(135deg,#f9a97e,#e07b54); color:#fff; }
  .empty-msg { text-align:center; color:#c9a898; font-size:0.9rem; padding:16px 0; }
</style>
</head>
<body>
<h1>🎡 교실 룰렛</h1>
<div class="main">
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="420" height="420"></canvas>
    <button class="spin-btn" id="spinBtn" onclick="spin()">돌리기! 🎉</button>
  </div>
  <div class="panel">
    <h2>📝 항목 목록</h2>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="항목 추가" onkeydown="if(event.key==='Enter')addItem()">
      <button onclick="addItem()">+</button>
    </div>
    <ul class="items-list" id="itemsList"></ul>
    <button class="edit-items-btn" onclick="openEditModal()">✏️ 전체 편집 / 초기화</button>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText"></span>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="label">🎉 당첨!</div>
    <div class="winner" id="winnerText"></div>
  </div>
  <button class="close-btn" onclick="closeOverlay()">확인</button>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">🎡 항목 설정</h2>
    <p id="modalDesc">항목을 한 줄에 하나씩 입력하세요.</p>
    <textarea id="modalTextarea" placeholder="김철수&#10;이영희&#10;박민준&#10;..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" id="modalCancelBtn" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveModal()">저장하기</button>
    </div>
  </div>
</div>

<script>
// ⭐ 여기에 Google Apps Script 웹 앱 URL을 입력하세요
const API_URL = "https://script.google.com/macros/s/AKfycbwSVmvdDt_p5ZMmXZ45gQzVelIPvZZb29SCPSyYcq4c5HPPm5knZ2xTn_e5l5Z6HX8j/exec";

const COLORS = ['#f28b82','#f9a97e','#ffd166','#8ac97e','#74c2bd','#7eb8f9','#b39ddb','#f48fb1','#4fc3f7','#aed581','#ff8a65','#90a4ae','#a1887f','#9575cd','#29b6f6'];
const LS_KEY = 'classroom-roulette-items';

let items = [];
let spinning = false;
let angle = 0;
let isFirstLoad = false;

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const cx = canvas.width/2, cy = canvas.height/2, r = cx-10;

function setStatus(type, msg) {
  document.getElementById('statusDot').className = 'status-dot ' + type;
  document.getElementById('statusText').textContent = msg;
}

// ── 불러오기: Sheets → localStorage 폴백 ──────────────
async function loadItems() {
  setStatus('loading', '불러오는 중...');
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      items = data;
      localStorage.setItem(LS_KEY, JSON.stringify(items));
      setStatus('ok', `✅ ${items.length}개 항목 불러옴`);
      renderList(); draw(); return;
    }
  } catch(e) {}
  // Sheets 실패 시 localStorage 사용
  const saved = localStorage.getItem(LS_KEY);
  if (saved) {
    items = JSON.parse(saved);
    setStatus('ok', `✅ ${items.length}개 항목 (로컬 저장)`);
    renderList(); draw();
  } else {
    isFirstLoad = true;
    setStatus('err', '항목을 입력해 주세요');
    openSetupModal();
    renderList(); draw();
  }
}

// ── 저장: Sheets + localStorage 동시 ─────────────────
async function saveItems() {
  localStorage.setItem(LS_KEY, JSON.stringify(items));
  setStatus('loading', '저장 중...');
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(items)
    });
    setStatus('ok', '✅ 저장 완료');
  } catch(e) {
    setStatus('ok', '✅ 로컬 저장됨 (Sheets 연결 확인 필요)');
  }
}

// ── Modal ─────────────────────────────────────────────
function openSetupModal() {
  document.getElementById('modalTitle').textContent = '🎡 항목 설정';
  document.getElementById('modalDesc').textContent = '항목을 한 줄에 하나씩 입력하세요.';
  document.getElementById('modalCancelBtn').style.display = isFirstLoad ? 'none' : '';
  document.getElementById('modalTextarea').value = items.join('\n');
  document.getElementById('modalBg').classList.add('show');
  setTimeout(() => document.getElementById('modalTextarea').focus(), 100);
}
function openEditModal() {
  isFirstLoad = false;
  document.getElementById('modalTitle').textContent = '✏️ 전체 편집';
  document.getElementById('modalDesc').textContent = '항목을 한 줄에 하나씩 입력하세요. 저장하면 Google Sheets에 반영됩니다.';
  document.getElementById('modalCancelBtn').style.display = '';
  document.getElementById('modalTextarea').value = items.join('\n');
  document.getElementById('modalBg').classList.add('show');
  setTimeout(() => document.getElementById('modalTextarea').focus(), 100);
}
function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
function saveModal() {
  const parsed = document.getElementById('modalTextarea').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if (!parsed.length) { alert('항목을 최소 1개 입력해주세요.'); return; }
  items = parsed; isFirstLoad = false;
  closeModal(); renderList(); draw(); saveItems();
}

function addItem() {
  const inp = document.getElementById('itemInput');
  const val = inp.value.trim(); if (!val) return;
  items.push(val); inp.value = '';
  renderList(); draw(); saveItems();
}
function removeItem(i) { items.splice(i,1); renderList(); draw(); saveItems(); }

function renderList() {
  const ul = document.getElementById('itemsList');
  if (!items.length) { ul.innerHTML = '<li class="empty-msg">항목이 없습니다</li>'; return; }
  ul.innerHTML = items.map((item,i) => `
    <li>
      <span class="dot" style="background:${COLORS[i%COLORS.length]}"></span>
      <span class="name">${item}</span>
      <button class="del-btn" onclick="removeItem(${i})">✕</button>
    </li>`).join('');
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (!items.length) {
    ctx.fillStyle='rgba(192,97,74,0.08)';
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#c9a898'; ctx.font='bold 20px Segoe UI'; ctx.textAlign='center';
    ctx.fillText('항목을 추가하세요',cx,cy); return;
  }
  const arc=(Math.PI*2)/items.length;
  items.forEach((item,i) => {
    const s=angle+arc*i, e=s+arc;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,s,e); ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length]; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(s+arc/2); ctx.textAlign='right';
    ctx.fillStyle='#fff';
    const fs=items.length>10?13:items.length>6?15:18;
    ctx.font=`bold ${fs}px Segoe UI`;
    ctx.shadowColor='rgba(0,0,0,0.25)'; ctx.shadowBlur=4;
    const label=item.length>8?item.slice(0,8)+'…':item;
    ctx.fillText(label,r-12,6); ctx.restore();
  });
  ctx.beginPath(); ctx.arc(cx,cy,26,0,Math.PI*2);
  ctx.fillStyle='#fff8f5'; ctx.fill();
  ctx.strokeStyle='#e07b54'; ctx.lineWidth=3; ctx.stroke();
}

function spin() {
  if (spinning||!items.length) return;
  spinning=true; document.getElementById('spinBtn').disabled=true;
  const total=(Math.random()*5+8)*Math.PI*2, dur=4000+Math.random()*1000;
  let start=null;
  const ease=t=>1-Math.pow(1-t,3);
  const step=ts=>{
    if(!start)start=ts;
    const p=Math.min((ts-start)/dur,1);
    angle=(total*ease(p))%(Math.PI*2); draw();
    if(p<1) requestAnimationFrame(step);
    else { spinning=false; document.getElementById('spinBtn').disabled=false; showResult(); }
  };
  requestAnimationFrame(step);
}

function showResult() {
  const arc=(Math.PI*2)/items.length;
  const norm=((Math.PI*1.5-angle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  const idx=Math.floor(norm/arc)%items.length;
  document.getElementById('winnerText').textContent=items[idx];
  document.getElementById('overlay').classList.add('show');
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('show'); }

loadItems();
</script>
</body>
</html>
